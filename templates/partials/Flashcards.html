<!-- =====================================================================
     FLASHCARDS PANEL — Browse + Viewer
     ===================================================================== -->

<!-- ── BROWSE VIEW (document grid) ── -->
<div id="fcBrowseView">
  <div class="fc-browse-header">
    <div class="browse-header-left">
      <h1 class="browse-title">Flashcards</h1>
      <p class="browse-subtitle">Review and memorize your study material</p>
    </div>
    <div class="fc-search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" id="fcSearchInput" placeholder="Search documents..." oninput="Flashcards.filterDocs(this.value)">
    </div>
  </div>

  <!-- Document card grid -->
  <div class="documents-grid" id="fcDocsGrid"></div>

  <!-- Empty state -->
  <div class="fc-empty-state" id="fcEmptyState" style="display:none;">
    <i class="fas fa-layer-group fc-empty-icon"></i>
    <h3 class="fc-empty-title">No Documents Yet</h3>
    <p class="fc-empty-text">Upload a document to generate flashcards!</p>
    <button class="btn-primary" onclick="triggerFileUpload()">
      <i class="fas fa-cloud-upload-alt"></i> Upload Document
    </button>
  </div>
</div>

<!-- ── VIEWER VIEW (flashcard flip-card UI) ── -->
<div id="fcViewerView" style="display:none;">

  <!-- Panel Header -->
  <div class="fc-panel-header">
    <div class="fc-panel-header-left">
      <button class="fc-back-btn" onclick="Flashcards.showBrowse()">
        <i class="fas fa-arrow-left"></i> Back
      </button>
      <div>
        <h1 class="fc-panel-title" id="fcPanelTitle">Flashcards</h1>
        <p class="fc-panel-subtitle" id="fcPanelSubtitle"></p>
      </div>
    </div>
    <div class="fc-panel-controls">
      <button class="fc-control-btn fc-action-btn fc-notes-btn" onclick="Flashcards.openNotes()">
        <i class="fas fa-sticky-note"></i> Study Notes
      </button>
      <button class="fc-control-btn fc-action-btn fc-quiz-btn" onclick="Flashcards.openQuiz()">
        <i class="fas fa-question-circle"></i> Start Quiz
      </button>
      <button class="fc-control-btn" onclick="Flashcards.shuffleCards()">
        <i class="fas fa-random"></i> Shuffle
      </button>
      <button class="fc-control-btn" onclick="Flashcards.restartCards()">
        <i class="fas fa-redo"></i> Restart
      </button>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="fc-panel-progress-bar">
    <div class="fc-panel-progress-fill" id="fcPanelProgressFill"></div>
  </div>
  <p class="fc-panel-progress-label" id="fcPanelProgressLabel"></p>

  <!-- Card Area -->
  <div class="fc-panel-card-area">
    <button class="fc-nav-btn" id="fcPanelPrevBtn" onclick="Flashcards.navigateCard(-1)">
      <i class="fas fa-chevron-left"></i>
    </button>

    <div class="fc-panel-card" onclick="Flashcards.flipCard()">
      <div class="fc-card-inner" id="fcPanelCardInner">
        <div class="fc-card-front">
          <span class="fc-card-label">Question</span>
          <p class="fc-card-text" id="fcPanelQuestion"></p>
          <span class="fc-flip-hint"><i class="fas fa-sync-alt"></i> Click to reveal answer</span>
        </div>
        <div class="fc-card-back">
          <span class="fc-card-label">Answer</span>
          <p class="fc-card-text" id="fcPanelAnswer"></p>
        </div>
      </div>
    </div>

    <button class="fc-nav-btn" id="fcPanelNextBtn" onclick="Flashcards.navigateCard(1)">
      <i class="fas fa-chevron-right"></i>
    </button>
  </div>

</div>
